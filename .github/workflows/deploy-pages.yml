jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository (since files are already built)
          path: '.'
          
      name: Deploy to GitHub Pages

      on:
        push:
          branches: [ main ]
        workflow_dispatch:

      permissions:
        contents: read
        pages: write
        id-token: write

      concurrency:
        group: deploy-pages
        cancel-in-progress: false

      jobs:
        build-and-deploy:
          runs-on: ubuntu-latest

          steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Use Node.js 18
              uses: actions/setup-node@v4
              with:
                node-version: 18

            - name: Install dependencies
              run: |
                npm ci

            - name: Build
              run: |
                npm run build

            name: Deploy to GitHub Pages

            on:
              push:
                branches: [ main ]
              workflow_dispatch:

            permissions:
              contents: read
              pages: write
              id-token: write

            concurrency:
              group: deploy-pages
              cancel-in-progress: false

            jobs:
              build-and-deploy:
                runs-on: ubuntu-latest

                steps:
                  - name: Checkout
                    uses: actions/checkout@v4

                  - name: Use Node.js 18
                    uses: actions/setup-node@v4
                    with:
                      node-version: 18

                  - name: Install dependencies
                    run: |
                      npm ci

                  - name: Build
                    run: |
                      npm run build

                  - name: Deploy to GitHub Pages
                    uses: peaceiris/actions-gh-pages@v3
                    with:
                      github_token: ${{ secrets.GITHUB_TOKEN }}
                      publish_dir: ./dist
                      publish_branch: gh-pages
                      keep_files: false
